<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        AI Resume ATS Dashboard
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >
</head>

<body>

<div class="container">

    <header>

        <h1>
            AI Resume ATS Dashboard
        </h1>

        <p>
            Bulk Upload • Search • ATS Ranking
        </p>

    </header>

    <!-- Upload -->

    <section class="card">

        <h2>
            Upload Resumes
        </h2>

        <input
            type="file"
            id="resumeFiles"
            multiple
            accept=".pdf"
        >

        <button
            onclick="uploadBulkResume()"
        >
            Upload PDFs
        </button>

    </section>

    <!-- Search -->

    <section class="card">

        <h2>
            Search By Skill
        </h2>

        <div class="row">

            <input
                type="text"
                id="skillSearch"
                placeholder="Python, FastAPI, SQL..."
            >

            <button
                onclick="searchCandidates()"
            >
                Search
            </button>

        </div>

    </section>

    <!-- JD -->

    <section class="card">

        <h2>
            ATS Job Matching
        </h2>

        <textarea
            id="jobDescription"
            rows="8"
            placeholder="Paste complete job description here..."
        ></textarea>

        <button
            onclick="rankCandidates()"
        >
            Rank Candidates
        </button>

    </section>

    <!-- Rankings -->

    <section class="card">

        <div class="section-header">

            <h2>
                ATS Rankings
            </h2>

        </div>

        <table
            id="rankingTable"
        >

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Score</th>
                    <th>Matched Skills</th>

                </tr>

            </thead>

            <tbody></tbody>

        </table>

    </section>

    <!-- Candidate DB -->

    <section class="card">

        <div class="section-header">

            <h2>
                Candidate Database
            </h2>

            <button
                onclick="exportCSV()"
            >
                Export CSV
            </button>

        </div>

        <table
            id="candidateTable"
        >

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Skills</th>
                    <th>ATS Score</th>

                </tr>

            </thead>

            <tbody></tbody>

        </table>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
